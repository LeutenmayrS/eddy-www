<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Eddy — Kehrwasser">
  <rect width="1200" height="630" fill="#1B4B64"/>

  <!-- Mark (Eddy spiral) -->
  <g transform="translate(120 280)" fill="none" stroke="#FBF7F1" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 50 -10 A 35 35 0 1 0 15 30"/>
    <polyline points="15 30 5 22 8 38"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="310"
        font-family="Nunito Sans, system-ui, sans-serif"
        font-size="140"
        font-weight="400"
        letter-spacing="-3"
        fill="#FBF7F1">Kehrwasser</text>

  <!-- Subline -->
  <text x="260" y="378"
        font-family="Nunito Sans, system-ui, sans-serif"
        font-size="38"
        font-weight="400"
        fill="#7EB0C9">Werkzeuge für Paddler — eddy-apps.com</text>

  <!-- Subtle wave at bottom -->
  <path d="M 0 580 Q 200 540, 400 580 T 800 580 T 1200 580 L 1200 630 L 0 630 Z"
        fill="#143848"/>
